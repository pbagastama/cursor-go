# Fly.io config for the CursorGo backend.
# Deploy: `fly launch --no-deploy` (accept this file) then `fly deploy`.
# Set secrets: `fly secrets set CURSOR_API_KEY=key_... ALLOWED_ORIGINS=https://yourapp.netlify.app`
app = "cursorgo-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "30s"
  timeout = "5s"
